<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://github.com/manojmallick">
    <title>Manoj Mallick - Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1c2128 100%);
            color: #c9d1d9;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 1rem;
            color: #58a6ff;
            font-weight: 600;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: 500;
            padding: 0.75rem 2rem;
            border: 2px solid #58a6ff;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: inline-block;
        }
        a:hover {
            background: #58a6ff;
            color: #0d1117;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.4);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(88, 166, 255, 0.3);
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">👨‍💻</div>
        <h1>Manoj Mallick</h1>
        <p>Redirecting to GitHub Profile...</p>
        <div class="spinner"></div>
        <p style="font-size: 0.95em; margin-top: 2rem;">
            If you're not redirected automatically, 
            <a href="https://github.com/manojmallick">click here to visit my profile</a>
        </p>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = "https://github.com/manojmallick";
        }, 1500);
    </script>
</body>
</html>
